<html lang="zh-HK">
<head>

    <style>
        /* =========================================
           色彩變量與全域設定
           ========================================= */
        :root {
            --bg-color: #F8FAFC;
            --text-main: #0F172A;
            --text-muted: #475569;
            --primary-color: #3B82F6;
            --primary-hover: #1D4ED8;
            --card-bg: #FFFFFF;
            --card-shadow: rgba(0, 0, 0, 0.05);
            --nav-bg: rgba(248, 250, 252, 0.9);
            --border-color: #E2E8F0;
            --task-bg: #F1F5F9;
        }

        [data-theme="dark"] {
            --bg-color: #0F172A;
            --text-main: #F8FAFC;
            --text-muted: #CBD5E1;
            --primary-color: #3B82F6;
            --primary-hover: #60A5FA;
            --card-bg: #1E293B;
            --card-shadow: rgba(0, 0, 0, 0.2);
            --nav-bg: rgba(15, 23, 42, 0.9);
            --border-color: #334155;
            --task-bg: #0F172A;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* =========================================
           導航欄
           ========================================= */
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background-color: var(--nav-bg); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-color), var(--primary-hover)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; align-items: center; gap: 1rem; }
        .theme-toggle, .lang-toggle { background: var(--card-bg); border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 2px 5px var(--card-shadow); }
        .theme-toggle { font-size: 1.2rem; }
        .lang-toggle { font-size: 1rem; font-weight: bold; }

        /* =========================================
           主要內容區域
           ========================================= */
        main { padding: 100px 5% 5rem; max-width: 1400px; margin: 0 auto; }
        
        .page-header { text-align: center; margin-bottom: 2.5rem; }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 1rem; color: var(--text-main); }
        .page-header p { color: var(--text-muted); font-size: 1.1rem; max-width: 800px; margin: 0 auto; }

        /* =========================================
           篩選器 Filter Console
           ========================================= */
        .filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 3rem; padding-bottom: 1rem; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 0.6rem 1.5rem; border-radius: 50px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 2px 5px var(--card-shadow); }
        .filter-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .filter-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* =========================================
           名校資訊卡片牆 (Grid)
           ========================================= */
        .uni-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        .db-card { background-color: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 30px var(--card-shadow); border: 1px solid var(--border-color); padding: 1.8rem; display: flex; flex-direction: column; transition: transform 0.3s, box-shadow 0.3s; animation: fadeIn 0.4s ease forwards; }
        .db-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px var(--card-shadow); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 卡片頭部 */
        .card-header { margin-bottom: 1.2rem; }
        .uni-name { font-size: 1.25rem; font-weight: 700; color: var(--primary-color); margin-bottom: 0.5rem; line-height: 1.3; }
        
        /* 標籤 */
        .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
        .tag { padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: bold; border: 1px solid var(--border-color); }
        .tag-region { background: var(--task-bg); color: var(--text-main); }
        .tag.reach { color: #EF4444; border-color: #FECACA; background-color: #FEF2F2; }
        .tag.target { color: #F59E0B; border-color: #FDE68A; background-color: #FFFBEB; }
        .tag.safety { color: #10B981; border-color: #A7F3D0; background-color: #ECFDF5; }
        [data-theme="dark"] .tag.reach { background-color: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }
        [data-theme="dark"] .tag.target { background-color: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); }
        [data-theme="dark"] .tag.safety { background-color: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }

        /* 門檻數據區 */
        .req-box { background: var(--task-bg); padding: 1.2rem; border-radius: 12px; border: 1px solid var(--border-color); flex-grow: 1; display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.2rem; }
        .req-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; border-bottom: 1px dashed var(--border-color); padding-bottom: 0.8rem; }
        .req-row:last-child { border-bottom: none; padding-bottom: 0; }
        .req-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
        .req-value { font-size: 0.9rem; color: var(--text-main); font-weight: bold; text-align: right; word-break: break-word; }

        /* 優勢專業 */
        .majors-section { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; border-top: 2px solid var(--border-color); padding-top: 1rem; }
        .majors-title { font-weight: bold; color: var(--text-main); margin-bottom: 0.3rem; display: block; }

        footer { text-align: center; padding: 2rem 5%; background-color: var(--bg-color); border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.9rem; margin-top: 3rem; }

        @media (max-width: 768px) {
            .filter-container { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; padding-bottom: 15px; scrollbar-width: none; }
            .filter-container::-webkit-scrollbar { display: none; }
            .filter-btn { white-space: nowrap; }
        }
    </style>
</head>

        function renderCards(filterRegion) {
            uniGrid.innerHTML = '';

            filteredData.forEach(uni => {
                const cardHTML = `

        // === 語言切換邏輯 ===
        const langToggleBtn = document.getElementById('lang-toggle');
        let currentLang = localStorage.getItem('lang') || 'zh';

        function updateLanguage(lang) {
            document.querySelectorAll('.lang-switch').forEach(el => {
                const customText = el.getAttribute(`data-${lang}`);
                if (customText) {
                    el.innerHTML = customText;
                }
            });
            langToggleBtn.textContent = lang === 'zh' ? 'EN' : '中';
            document.documentElement.lang = lang === 'zh' ? 'zh-HK' : 'en';
        }

        langToggleBtn.addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('lang', currentLang);
            updateLanguage(currentLang);
        });

        // === 篩選按鈕事件綁定 ===
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {

            });
        });

        renderCards('all');
