<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Dash 2D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Fredoka+One&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            font-family: 'Fredoka One', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 450px;
            background: #87CEEB;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #fff;
            border-radius: 15px;
        }

        canvas { display: block; }

        /* UI 覆蓋層 */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s;
        }

        .hidden { opacity: 0; pointer-events: none; }

        /* 標題風格 */
        h1 {
            font-family: 'Black Ops One', cursive;
            font-size: 60px;
            color: #ffcc00; /* 金黃色 */
            text-shadow: 
                3px 3px 0px #ff0055, 
                6px 6px 0px #000;
            transform: skew(-10deg) rotate(-5deg);
            margin: 0 0 20px 0;
            letter-spacing: 2px;
        }

        .score-hud {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 32px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        .coin-icon {
            width: 30px; height: 30px;
            background: gold;
            border-radius: 50%;
            border: 3px solid #d4af37;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.5);
            display: inline-block;
        }

        button {
            background: #00d2ff;
            border: 4px solid #fff;
            color: #fff;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Fredoka One', cursive;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0099cc, 0 10px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            text-transform: uppercase;
        }

        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95) translateY(4px); box-shadow: 0 2px 0 #0099cc; }

        .controls-hint {
            margin-top: 20px;
            color: #fff;
            font-size: 16px;
            text-shadow: 1px 1px 2px black;
            display: flex;
            gap: 20px;
        }
        .key {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 5px;
            border: 2px solid #fff;
        }

        /* 噴漆效果 */
        .spray-text {
            position: absolute;
            font-size: 24px;
            color: #ff0055;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s forwards;
            text-shadow: 2px 2px 0 #fff;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        
        <div class="score-hud">
            <div class="coin-icon"></div>
            <span id="coinScore">0</span>
        </div>

        <div id="ui-layer" class="ui-layer">
            <h1>SUBWAY DASH</h1>
            <button onclick="startGame()">TAP TO PLAY</button>
            <div class="controls-hint">
                <span><span class="key">↑</span> JUMP</span>
                <span><span class="key">↓</span> ROLL</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const coinScoreEl = document.getElementById('coinScore');
        const container = document.getElementById('game-container');

        // 音效合成
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'jump') {
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'coin') {
                osc.type = 'triangle'; // 清脆的聲音
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // 遊戲參數
        let gameSpeed = 8;
        let score = 0;
        let coins = 0;
        let isRunning = false;
        let frame = 0;

        // 地面高度
        const groundHeight = 60;
        const groundY = canvas.height - groundHeight;

        // 玩家物件
        const player = {
            x: 100,
            y: groundY,
            w: 40,
            h: 70, // 站立高度
            h_stand: 70,
            h_roll: 35, // 翻滾高度
            dy: 0,
            jumpForce: -16,
            gravity: 0.8,
            grounded: true,
            rolling: false,
            rollTimer: 0,
            colorHead: '#ffcc00', // 塗鴉金
            colorBody: '#ff0055', // 塗鴉紅
            colorLegs: '#333'
        };

        // 物件池
        let obstacles = [];
        let coinsList = [];
        let particles = [];
        let bgOffset = 0;

        function startGame() {
            isRunning = true;
            uiLayer.classList.add('hidden');
            obstacles = [];
            coinsList = [];
            particles = [];
            coins = 0;
            score = 0;
            gameSpeed = 8;
            coinScoreEl.innerText = "0";
            
            player.y = groundY - player.h;
            player.dy = 0;
            
            loop();
        }

        function loop() {
            if (!isRunning) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            update();
            draw();
            
            requestAnimationFrame(loop);
        }

        function update() {
            frame++;
            gameSpeed += 0.002; // 緩慢加速

            // --- 背景視差 ---
            bgOffset -= gameSpeed * 0.5;
            if (bgOffset <= -canvas.width) bgOffset = 0;

            // --- 玩家物理 ---
            // 跳躍與重力
            if (!player.grounded) {
                player.dy += player.gravity;
                player.y += player.dy;
            }

            // 地面碰撞
            if (player.y + player.h >= groundY) {
                player.y = groundY - player.h;
                player.dy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }

            // 翻滾邏輯
            if (player.rolling) {
                player.h = player.h_roll;
                player.rollTimer--;
                if (player.rollTimer <= 0) {
                    player.rolling = false;
                    player.y -= (player.h_stand - player.h_roll); // 恢復站立位置修正
                    player.h = player.h_stand;
                }
            }

            // --- 生成障礙物 ---
            if (frame % Math.floor(1000 / gameSpeed) === 0) {
                let type = Math.random();
                // 30% 生成高障礙 (需翻滾)，70% 生成低障礙 (需跳躍)
                if (type < 0.3) {
                    // 高障礙 (Sign)
                    obstacles.push({
                        x: canvas.width,
                        y: groundY - 110, // 懸空
                        w: 70,
                        h: 60,
                        type: 'sign'
                    });
                } else {
                    // 低障礙 (Barrier)
                    obstacles.push({
                        x: canvas.width,
                        y: groundY - 50,
                        w: 50,
                        h: 50,
                        type: 'barrier'
                    });
                }
                
                // 生成金幣 (跟隨障礙物或獨立生成)
                spawnCoins();
            }

            // --- 更新障礙物 ---
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // 碰撞檢測
                if (
                    player.x < obs.x + obs.w - 10 &&
                    player.x + player.w > obs.x + 10 &&
                    player.y < obs.y + obs.h - 10 &&
                    player.y + player.h > obs.y + 10
                ) {
                    gameOver();
                }

                if (obs.x + obs.w < 0) obstacles.splice(i, 1);
            }

            // --- 更新金幣 ---
            for (let i = coinsList.length - 1; i >= 0; i--) {
                let c = coinsList[i];
                c.x -= gameSpeed;
                c.rot += 0.2; // 旋轉動畫

                // 吃金幣
                let centerX = player.x + player.w/2;
                let centerY = player.y + player.h/2;
                let dist = Math.sqrt((centerX - c.x)**2 + (centerY - c.y)**2);
                
                if (dist < 40) { // 吸附範圍
                    coinsList.splice(i, 1);
                    coins++;
                    coinScoreEl.innerText = coins;
                    playSound('coin');
                    createFloatingText("+1", player.x, player.y);
                } else if (c.x < -20) {
                    coinsList.splice(i, 1);
                }
            }
        }

        function spawnCoins() {
            // 在空中生成一排金幣
            if (Math.random() > 0.5) {
                let startX = canvas.width + 100;
                let heightLevel = Math.random() > 0.5 ? groundY - 150 : groundY - 40;
                for(let i=0; i<3; i++) {
                    coinsList.push({
                        x: startX + i * 50,
                        y: heightLevel,
                        rot: 0
                    });
                }
            }
        }

        function draw() {
            // 1. 畫背景 (城市剪影)
            // 遠景
            ctx.fillStyle = '#0066cc'; // 深藍天
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 城市層
            ctx.fillStyle = '#004080';
            for(let i=0; i<10; i++) {
                let h = 100 + Math.sin(i*132)*50;
                ctx.fillRect((bgOffset/2 + i * 150) % (canvas.width+150) - 150, groundY - h, 100, h);
            }
            
            // 2. 畫鐵軌 (地面)
            ctx.fillStyle = '#555'; // 碎石路
            ctx.fillRect(0, groundY, canvas.width, groundHeight);
            
            // 枕木效果 (移動感)
            ctx.fillStyle = '#333';
            let tieSpacing = 40;
            let tieOffset = (bgOffset * 2) % tieSpacing;
            for (let x = tieOffset; x < canvas.width; x += tieSpacing) {
                ctx.fillRect(x, groundY + 5, 20, groundHeight - 10);
            }
            // 鐵軌線
            ctx.fillStyle = '#888';
            ctx.fillRect(0, groundY + 10, canvas.width, 5);
            ctx.fillRect(0, groundY + groundHeight - 15, canvas.width, 5);

            // 3. 畫障礙物
            obstacles.forEach(obs => {
                if (obs.type === 'barrier') {
                    // 紅白路障
                    ctx.fillStyle = '#ff3333';
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(obs.x, obs.y + 10, obs.w, 10);
                    ctx.fillRect(obs.x, obs.y + 30, obs.w, 10);
                } else {
                    // 高處招牌
                    ctx.fillStyle = '#009944'; // 綠色路牌
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Arial';
                    ctx.fillText('SUBWAY', obs.x + 5, obs.y + 20);
                    ctx.fillText('->', obs.x + 20, obs.y + 40);
                    // 支柱
                    ctx.fillStyle = '#444';
                    ctx.fillRect(obs.x + 5, 0, 5, obs.y);
                    ctx.fillRect(obs.x + obs.w - 10, 0, 5, obs.y);
                }
            });

            // 4. 畫金幣
            coinsList.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                // 旋轉效果 (縮放寬度)
                let scaleX = Math.abs(Math.cos(c.rot));
                ctx.scale(scaleX, 1);
                
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fillStyle = 'gold';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#d4af37';
                ctx.stroke();
                
                // 閃光
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-5, -5, 3, 0, Math.PI*2);
                ctx.fill();
                
                ctx.restore();
            });

            // 5. 畫玩家 (簡單的塗鴉風格人物)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 身體 (帽T)
            ctx.fillStyle = player.colorBody;
            ctx.fillRect(0, 0, player.w, player.h - 20);
            
            // 頭/帽子
            ctx.fillStyle = player.colorHead;
            ctx.fillRect(-5, -10, player.w + 10, 20); // 帽緣
            
            // 褲子
            ctx.fillStyle = player.colorLegs;
            ctx.fillRect(5, player.h - 25, 10, 25); // 左腿
            ctx.fillRect(25, player.h - 25, 10, 25); // 右腿

            // 背包 (噴漆罐)
            ctx.fillStyle = '#00d2ff';
            ctx.fillRect(-10, 10, 10, 20);

            ctx.restore();
        }

        function createFloatingText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'spray-text';
            el.innerText = text;
            el.style.left = (container.offsetLeft + x) + 'px';
            el.style.top = (container.offsetTop + y) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function gameOver() {
            isRunning = false;
            playSound('hit');
            uiLayer.classList.remove('hidden');
            document.querySelector('h1').innerText = "BUSTED!";
            document.querySelector('button').innerText = "TRY AGAIN";
        }

        // --- 控制 ---
        function handleInput(action) {
            if (!isRunning) return;

            if (action === 'jump') {
                if (player.grounded) {
                    player.dy = player.jumpForce;
                    player.grounded = false;
                    player.rolling = false; // 取消翻滾
                    player.h = player.h_stand;
                    playSound('jump');
                }
            } else if (action === 'roll') {
                if (!player.rolling && player.grounded) {
                    player.rolling = true;
                    player.rollTimer = 40; // 翻滾持續時間
                    player.y += (player.h_stand - player.h_roll); // 瞬間壓低
                } else if (!player.grounded) {
                    // 空中快速下墜
                    player.dy = 15;
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'Space' || e.code === 'KeyW') handleInput('jump');
            if (e.code === 'ArrowDown' || e.code === 'KeyS') handleInput('roll');
        });

        // 觸控支持
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', e => {
            let touchEndY = e.changedTouches[0].clientY;
            let diff = touchStartY - touchEndY;
            if (Math.abs(diff) > 30) {
                if (diff > 0) handleInput('jump'); // 上滑
                else handleInput('roll'); // 下滑
            } else {
                handleInput('jump'); // 點擊
            }
        });

    </script>
</body>
</html>
